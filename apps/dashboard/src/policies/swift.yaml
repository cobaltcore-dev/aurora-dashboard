# Swift Object Storage Policies
# Uses Swift terminology (containers) for OpenStack Swift

swift_admin: "role:admin or role:objectstore_admin"
swift_viewer: "role:objectstore_viewer or rule:swift_admin"

# Entry / Service Access
swift:entry_list: "not project_id:nil"

# Container Operations
swift:container_get: "rule:swift_viewer"
swift:container_check_acls: "rule:swift_viewer"
swift:container_show_access_control: "rule:swift_viewer"
swift:container_list: "rule:swift_viewer"
swift:container_new: "rule:swift_admin"
swift:container_create: "rule:swift_admin"
swift:container_update: "rule:swift_admin"
swift:container_delete: "rule:swift_admin"
swift:container_empty: "rule:swift_admin"
swift:container_pre_empty: "rule:swift_admin"
swift:container_confirm_deletion: "rule:swift_admin"
swift:container_confirm_emptying: "rule:swift_admin"
swift:container_update_access_control: "rule:swift_admin"

# Object Operations
swift:object_get: "rule:swift_viewer"
swift:object_list: "rule:swift_viewer"
swift:object_download: "rule:swift_viewer"
swift:object_update: "rule:swift_admin"
swift:object_delete: "rule:swift_admin"
swift:object_new_copy: "rule:swift_admin"
swift:object_create_copy: "rule:swift_admin"
swift:object_move: "rule:swift_admin"

# Folder Operations
swift:folder_new_object: "rule:swift_admin"
swift:folder_create_object: "rule:swift_admin"
swift:folder_new_folder: "rule:swift_admin"
swift:folder_create_folder: "rule:swift_admin"
swift:folder_delete: "rule:swift_admin"
