# Ceph S3 Object Storage Policies
# Uses S3/bucket terminology for Ceph RGW

ceph_admin: "role:admin or role:objectstore_admin"
ceph_viewer: "role:objectstore_viewer or rule:ceph_admin"

# Entry / Service Access
ceph:entry_list: "not project_id:nil"

# Bucket Operations (S3 terminology for Ceph)
ceph:bucket_get: "rule:ceph_viewer"
ceph:bucket_check_acls: "rule:ceph_viewer"
ceph:bucket_show_access_control: "rule:ceph_viewer"
ceph:bucket_list: "rule:ceph_viewer"
ceph:bucket_new: "rule:ceph_admin"
ceph:bucket_create: "rule:ceph_admin"
ceph:bucket_update: "rule:ceph_admin"
ceph:bucket_delete: "rule:ceph_admin"
ceph:bucket_empty: "rule:ceph_admin"
ceph:bucket_pre_empty: "rule:ceph_admin"
ceph:bucket_confirm_deletion: "rule:ceph_admin"
ceph:bucket_confirm_emptying: "rule:ceph_admin"
ceph:bucket_update_access_control: "rule:ceph_admin"

# Object Operations
ceph:object_get: "rule:ceph_viewer"
ceph:object_list: "rule:ceph_viewer"
ceph:object_download: "rule:ceph_viewer"
ceph:object_update: "rule:ceph_admin"
ceph:object_delete: "rule:ceph_admin"
ceph:object_new_copy: "rule:ceph_admin"
ceph:object_create_copy: "rule:ceph_admin"
ceph:object_move: "rule:ceph_admin"

# Folder/Prefix Operations
ceph:folder_new_object: "rule:ceph_admin"
ceph:folder_create_object: "rule:ceph_admin"
ceph:folder_new_folder: "rule:ceph_admin"
ceph:folder_create_folder: "rule:ceph_admin"
ceph:folder_delete: "rule:ceph_admin"
