name: "Setup PNPM"
description: "Installs Node.js, sets up PNPM, and restores dependencies from cache."
inputs:
  node-version:
    description: "The version of Node.js to install"
    required: true
    default: "20"
  pnpm-version:
    description: "The version of PNPM to install"
    required: true
    default: "10.33.0"
outputs:
  cache-hit:
    description: "Whether cache was hit for dependencies"
    value: ${{ steps.cache-pnpm.outputs.cache-hit }}
runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: ${{ inputs.node-version }}
    - name: Setup pnpm
      uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
      with:
        version: ${{ inputs.pnpm-version }}
    - name: Verify pnpm supports minimum-release-age (>=10.16)
      run: |
        PNPM_MINOR=$(pnpm --version | cut -d. -f2)
        PNPM_MAJOR=$(pnpm --version | cut -d. -f1)
        if [ "$PNPM_MAJOR" -lt 10 ] || { [ "$PNPM_MAJOR" -eq 10 ] && [ "$PNPM_MINOR" -lt 16 ]; }; then
          echo "ERROR: pnpm $(pnpm --version) does not support minimum-release-age (requires >=10.16)"
          exit 1
        fi
      shell: bash
    - name: Cache pnpm store and node_modules
      id: cache-pnpm
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.local/share/pnpm/store
          node_modules
        key: ${{ runner.OS }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml', '**/package.json') }}
        restore-keys: |
          ${{ runner.OS }}-pnpm-
    - name: Install Dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
    - name: Output Cache Hit Status
      run: echo "cache-hit=${{ steps.cache-pnpm.outputs.cache-hit }}" >> $GITHUB_ENV
      shell: bash
